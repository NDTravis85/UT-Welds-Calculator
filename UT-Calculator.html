<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UT Field Calculators</title>

<style>

body{
background:#000;
color:#fff;
font-family:Arial;
margin:0;
padding:20px;
}

.container{
max-width:600px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:30px;
}

h2{
margin-top:0;
}

.screen{
display:none;
}

.active{
display:block;
}

.card{
background:#111;
padding:20px;
border-radius:10px;
border:1px solid #333;
margin-bottom:20px;
}

label{
display:block;
margin-top:10px;
margin-bottom:5px;
}

input{
width:100%;
padding:12px;
font-size:16px;
background:#000;
border:1px solid #444;
color:#fff;
border-radius:6px;
}

button{
width:100%;
padding:14px;
margin-top:15px;
font-size:16px;
border:none;
border-radius:8px;
background:#0074ff;
color:#fff;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#005fcc;
}

.result{
margin-top:15px;
padding:12px;
border:1px solid #333;
border-radius:8px;
background:#000;
}

.back{
margin-top:20px;
background:#444;
}

.back:hover{
background:#333;
}

</style>
</head>

<body>

<div class="container">

<!-- HOME SCREEN -->

<div id="home" class="screen active">

<h1>UT Field Tools</h1>

<div class="card">

<button onclick="showScreen('scan')">Scan Distance</button>

<button onclick="showScreen('dac')">% of DAC</button>

</div>

</div>

<!-- SCAN DISTANCE SCREEN -->

<div id="scan" class="screen">

<h1>Scan Distance</h1>

<div class="card">

<label>Thickness (in)</label>
<input type="number" id="thickness">

<label>Weld Width (in)</label>
<input type="number" id="weldWidth">

<label>Refracted Angle (deg)</label>
<input type="number" id="angle">

<button onclick="calculateScanDistance()">Calculate</button>

<div id="scanResult" class="result"></div>

</div>

<button class="back" onclick="showScreen('home')">Back</button>

</div>

<!-- DAC SCREEN -->

<div id="dac" class="screen">

<h1>% of DAC</h1>

<div class="card">

<label>dB from DAC</label>
<input type="number" id="dbFromDAC">

<button onclick="calculatePercentDAC()">Calculate</button>

<div id="dacResult" class="result"></div>

</div>

<button class="back" onclick="showScreen('home')">Back</button>

</div>

</div>

<script>

function showScreen(screen){

document.querySelectorAll(".screen").forEach(s=>{
s.classList.remove("active")
})

document.getElementById(screen).classList.add("active")

}

function calculateScanDistance(){

let thickness=parseFloat(document.getElementById("thickness").value)
let weldWidth=parseFloat(document.getElementById("weldWidth").value)
let angle=parseFloat(document.getElementById("angle").value)

let result=document.getElementById("scanResult")

if(isNaN(thickness)||isNaN(weldWidth)||isNaN(angle)){
result.innerHTML="Enter valid numbers"
return
}

let angleRad=angle*Math.PI/180

let targetWidth=weldWidth+1.0

let scanDistance=(thickness*Math.tan(angleRad))+(targetWidth/2)

let fullSpan=scanDistance*2

result.innerHTML=

"Minimum Scan Distance from Weld Centerline: <b>"+scanDistance.toFixed(3)+" in</b><br><br>"+
"Target Width (Weld + HAZ): "+targetWidth.toFixed(3)+" in<br>"+
"Full Scan Span: "+fullSpan.toFixed(3)+" in"

}

function calculatePercentDAC(){

let db=parseFloat(document.getElementById("dbFromDAC").value)

let result=document.getElementById("dacResult")

if(isNaN(db)){
result.innerHTML="Enter a valid dB value"
return
}

let percent=Math.pow(10,(-db/20))*100

result.innerHTML="Response: <b>"+percent.toFixed(1)+"% DAC</b>"

}

</script>

</body>
</html>
